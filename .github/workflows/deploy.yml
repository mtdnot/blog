name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [directus-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch images from Directus
        run: node scripts/fetch-images.mjs
        env:
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
        
      - name: Build
        run: npm run build
        env:
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=blog --branch=main
